<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" 
          rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <link rel="stylesheet" href="../static/css/index_style.css">
    <title>Página Inicial</title>
</head>
<body>
<div class="corpo-pagina">
    <div class="estilo-navbar">
        <ul class="navbar nav justify-content-center h-10">
            <li class="item-navbar">
                <a class="navbar-link" aria-current="page" href="#">Sobre mim</a>
            </li>
            <li class="item-navbar">
                <a class="navbar-link" href="#">Organizador Investimentos</a>
            </li>
            <li class="item-navbar">
                <a class="navbar-link" href="calculadora.html">Calculadora Juros</a>
            </li>
        </ul> 
    </div>

<div class="d-flex h-90 justify-content-center align-items-center p-3 m-5 text-center">    
<div class="calculadora w-50 p-3">
    <form>
        <h2>Calculadora Juros Compostos</h2>
        <div class="input-group mb-3">
            <label class="d-flex justify-content-center align-items-center w-25">Valor Investido</label>
            <span class="input-group-text">R$</span>
                <input type="text" class="form-control">
                <span class="input-group-text">.00</span>
        </div>

        <div class="input-group mb-3">
            <label class="input-group-text w-25" for="inputGroupSelect01">Rentabilidade</label>
                <input type="text" class="form-control w-25">
            <select class="form-select" id="inputGroupSelect01">
                <option selected value="1">Anual</option>
                <option value="2">Meses</option>
            </select>                                       
        </div>

        <div class="input-group mb-3">
            <label class="input-group-text w-25" for="inputGroupSelect01">Período em </label>
                <input type="text" class="form-control w-25">
            <select class="form-select" id="inputGroupSelect01">
                <option selected value="1">Anos</option>
                <option value="2">Meses</option>
            </select>
        </div>
        <div class="d-grid gap-2">
            <button type="input" class="p-2 btn-submit">Calcular</button>
        </div>
    </form>
</div>
</div>
</div>

</body>
</html>
